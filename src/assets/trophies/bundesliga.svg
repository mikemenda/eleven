<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 110" fill="currentColor">
  <!-- The Meisterschale is uniquely a large shallow BOWL/plate, not a cup -->
  <!-- This is what makes it instantly recognisable -->
  <!-- Outer bowl rim -->
  <ellipse cx="40" cy="38" rx="34" ry="10"/>
  <!-- Bowl cavity (subtract inner) - shown as a thick ring -->
  <path d="M6 38 Q6 55 40 58 Q74 55 74 38 L70 38 Q70 52 40 55 Q10 52 10 38 Z"/>
  <!-- Inner bowl ring detail -->
  <ellipse cx="40" cy="38" rx="28" ry="7" fill="none" stroke="currentColor" strokeWidth="2"/>
  <!-- Pedestal column below bowl -->
  <path d="M34 58 L32 68 L48 68 L46 58 Z"/>
  <!-- Pedestal knop -->
  <rect x="28" y="68" width="24" height="6" rx="2"/>
  <!-- Pedestal stem -->
  <rect x="34" y="74" width="12" height="12" rx="1"/>
  <!-- Base plinth - wide and heavy -->
  <path d="M26 86 L24 92 Q23 96 26 97 L54 97 Q57 96 56 92 L54 86 Z"/>
  <rect x="20" y="97" width="40" height="5" rx="2"/>
  <rect x="16" y="102" width="48" height="4" rx="2"/>
  <!-- Bowl interior suggestion - crosshatch or inner ring -->
  <ellipse cx="40" cy="37" rx="20" ry="5"/>
</svg>
