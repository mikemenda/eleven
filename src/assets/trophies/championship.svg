  <!-- Stem -->
  <rect x="35" y="66" width="10" height="16" rx="1"/>
  <rect x="29" y="76" width="22" height="5" rx="2"/>
  <!-- Base -->
  <path d="M26 81 L24 88 Q23 92 26 93 L54 93 Q57 92 56 88 L54 81 Z"/>
