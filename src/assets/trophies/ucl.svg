  <path d="M58 22 Q72 18 74 30 Q76 42 64 46 Q60 48 56 46 L54 42 Q62 44 66 38 Q70 32 64 28 Q62 26 58 27 Z"/>
  <!-- Upper bowl - UCL cup is relatively narrow at top -->
