<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/eleven/favicon.ico" />
    <link rel="apple-touch-icon" href="/eleven/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080d1a" />
    <meta name="description" content="Eleven — FC Career Mode Companion" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eleven" />
    <title>Eleven — FC Career Mode Companion</title>
    <script>
      // Handle redirect from 404.html
      // 404.html stores the path already stripped of /eleven prefix
      const redirect = sessionStorage.getItem('redirect')
      if (redirect) {
        sessionStorage.removeItem('redirect')
        // Reconstruct full URL: /eleven + path (basename handles the rest)
        const full = '/eleven' + (redirect.startsWith('/') ? redirect : '/' + redirect)
        window.history.replaceState(null, '', full)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
